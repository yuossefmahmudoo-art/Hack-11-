<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Pro - Premium Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --accent: #ff0000;
            --card: #1a1a1a;
            --border: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
        }
        .font-display { font-family: 'Orbitron', sans-serif; }

        /* Game Area */
        .game-area {
            position: relative;
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
            border: 2px solid #222;
            border-radius: 12px;
            height: 400px;
            overflow: hidden;
        }
        
        #gameCanvas { width: 100%; height: 100%; display: block; }

        .game-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .multiplier {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            transition: color 0.2s;
        }

        /* Components */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .btn-main {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-main:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .btn-main:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-sec {
            background: #2a2a2a;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #444;
            width: 100%;
            cursor: pointer;
        }

        .input-box {
            background: #0a0a0a;
            border: 2px solid #333;
            padding: 15px;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            width: 100%;
            outline: none;
        }
        .input-box:focus { border-color: #ff0000; }

        .screen { display: none; }
        .screen.active { display: block; }

        .history-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 2px;
            font-weight: bold;
        }
        .h-low { background: rgba(255,0,0,0.2); color: #ff6666; border: 1px solid rgba(255,0,0,0.3); }
        .h-mid { background: rgba(0,100,255,0.2); color: #66aaff; border: 1px solid rgba(0,100,255,0.3); }
        .h-high { background: rgba(150,0,255,0.2); color: #bb88ff; border: 1px solid rgba(150,0,255,0.3); }

        .live-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 0.9rem;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Cooldown overlay */
        .cooldown-timer {
            font-size: 1.5rem;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md text-center">
                <div class="w-24 h-24 mx-auto mb-6 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-900/50">
                    <!-- Plane Icon -->
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="white"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                </div>
                <h1 class="font-display text-4xl font-bold mb-2">AVIATOR PRO</h1>
                <p class="text-gray-500 mb-8">أداة التوقع الذكي</p>

                <div class="card">
                    <form id="loginForm">
                        <label class="block text-sm text-gray-400 mb-2">أدخل مفتاح الدخول</label>
                        <input type="text" id="keyInput" class="input-box mb-4" placeholder="XXXX-XXXX" autocomplete="off">
                        <button type="submit" class="btn-main">دخول</button>
                    </form>
                    <p id="errorMsg" class="text-red-500 mt-4 hidden">المفتاح غير صحيح</p>
                    <div class="mt-6 pt-4 border-t border-gray-800">
                        <button id="goToSubBtn" class="text-gray-400 text-sm hover:text-white underline">ليس لديك مفتاح؟ اضغط هنا</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. SUBSCRIPTION SCREEN -->
    <div id="subScreen" class="screen">
        <div class="min-h-screen p-4 py-12 bg-black">
            <div class="max-w-4xl mx-auto">
                <button id="backToLogin" class="text-gray-400 mb-8 hover:text-white">&larr; رجوع</button>
                <h1 class="text-3xl font-bold mb-8 text-center">خطط الاشتراك</h1>
                
                <div class="grid md:grid-cols-4 gap-4">
                    <div class="card text-center">
                        <h3 class="text-xl mb-2">يوم واحد</h3>
                        <p class="text-2xl font-bold mb-4">$5</p>
                        <button onclick="alert('مفتاح التجربة: KEY-DAY-1')" class="btn-sec text-sm">طلب</button>
                    </div>
                    <div class="card text-center">
                        <h3 class="text-xl mb-2">يومين</h3>
                        <p class="text-2xl font-bold mb-4">$8</p>
                        <button onclick="alert('مفتاح التجربة: KEY-2DAYS')" class="btn-sec text-sm">طلب</button>
                    </div>
                    <div class="card border-red-500 text-center relative">
                        <span class="absolute -top-3 left-4 bg-red-600 text-xs px-2 py-1 rounded">موصى به</span>
                        <h3 class="text-xl mb-2">أسبوع</h3>
                        <p class="text-2xl font-bold mb-4">$25</p>
                        <button onclick="alert('مفتاح التجربة: KEY-WEEK')" class="btn-main text-sm">طلب</button>
                    </div>
                    <div class="card text-center">
                        <h3 class="text-xl mb-2">شهر</h3>
                        <p class="text-2xl font-bold mb-4">$70</p>
                        <button onclick="alert('مفتاح التجربة: KEY-MONTH')" class="btn-sec text-sm">طلب</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DASHBOARD -->
    <div id="dashScreen" class="screen">
        <header class="bg-black border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-20">
            <div class="flex items-center gap-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#ff0000"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
                <span class="font-bold">AVIATOR PRO</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="expDate" class="text-xs bg-gray-800 px-3 py-1 rounded-full"></span>
                <button id="logoutBtn" class="text-red-500 text-sm font-bold">خروج</button>
            </div>
        </header>

        <main class="max-w-5xl mx-auto p-4">
            <div class="grid lg:grid-cols-3 gap-4">
                <!-- Left: Game & Controls -->
                <div class="lg:col-span-2 space-y-4">
                    <!-- Game Visualization -->
                    <div class="game-area">
                        <canvas id="gameCanvas"></canvas>
                        <div class="game-overlay">
                            <div id="statusText" class="text-gray-400 mb-2 text-lg">جاهز للتوقع</div>
                            <div id="multiplierBox" class="multiplier">1.00x</div>
                            <div id="cooldownText" class="cooldown-timer"></div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="grid grid-cols-2 gap-4">
                        <button id="startBtn" class="btn-main">بدء التوقع</button>
                        <button id="copyBtn" class="btn-sec">نسخ النتيجة</button>
                    </div>

                    <!-- Result -->
                    <div id="resultBox" class="card hidden text-center border-red-500 bg-gray-900">
                        <p class="text-gray-400 text-sm">توقع الجولة القادمة</p>
                        <p id="finalVal" class="font-display text-4xl text-white mt-2">0.00x</p>
                    </div>
                </div>

                <!-- Right: Live & Stats -->
                <div class="space-y-4">
                    <!-- Live Feed -->
                    <div class="card">
                        <h3 class="font-bold mb-3 flex items-center gap-2 text-red-500">
                            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                            مباشر (Live)
                        </h3>
                        <div id="liveFeed" class="space-y-1 h-72 overflow-y-auto pr-2"></div>
                    </div>

                    <!-- History -->
                    <div class="card">
                        <h3 class="font-bold mb-3">سجل الجولات</h3>
                        <div id="historyBox" class="flex flex-wrap gap-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- SYSTEM CONFIGURATION ---
        const APP_KEYS = {
            'KEY-DAY-1': 1,
            'KEY-2DAYS': 2,
            'KEY-WEEK': 7,
            'KEY-MONTH': 30
        };

        // Large list of names
        const names = ['أحمد', 'محمد', 'سعيد', 'خالد', 'علي', 'فهد', 'سعود', 'عمر', 'يزيد', 'راشد', 'مالك', 'أسامة', 'طارق', 'حسين', 'محمود', 'عبدالله', 'فيصل', 'ماجد', 'وليد', 'سلمان', 'نواف', 'يوسف', 'زياد', 'باسم', 'جاسر', 'هتان', 'رياض', 'عماد', 'نبيل', 'جمال'];
        
        // --- STATE VARIABLES ---
        let isAnimating = false;
        let animFrameId = null;
        let cooldownTimer = null;
        let currentData = { x: 0, y: 0, target: 2.00 };
        
        // --- DOM ELEMENTS ---
        const screens = {
            login: document.getElementById('loginScreen'),
            sub: document.getElementById('subScreen'),
            dash: document.getElementById('dashScreen')
        };

        const els = {
            keyInput: document.getElementById('keyInput'),
            loginErr: document.getElementById('errorMsg'),
            expDate: document.getElementById('expDate'),
            canvas: document.getElementById('gameCanvas'),
            ctx: null,
            statusText: document.getElementById('statusText'),
            multiplierBox: document.getElementById('multiplierBox'),
            cooldownText: document.getElementById('cooldownText'),
            resultBox: document.getElementById('resultBox'),
            finalVal: document.getElementById('finalVal'),
            liveFeed: document.getElementById('liveFeed'),
            historyBox: document.getElementById('historyBox'),
            startBtn: document.getElementById('startBtn')
        };

        // --- INITIALIZATION ---
        window.onload = function() {
            els.ctx = els.canvas.getContext('2d');
            
            const exp = localStorage.getItem('avi_exp');
            if (exp && new Date(exp) > new Date()) {
                setupDashboard(exp);
            }
            
            // Event Listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('goToSubBtn').addEventListener('click', () => switchScreen('sub'));
            document.getElementById('backToLogin').addEventListener('click', () => switchScreen('login'));
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            els.startBtn.addEventListener('click', startPrediction);
            document.getElementById('copyBtn').addEventListener('click', copyResult);
            
            window.addEventListener('resize', resizeCanvas);
        };

        function switchScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        // --- AUTH HANDLERS ---
        function handleLogin(e) {
            e.preventDefault();
            const key = els.keyInput.value.trim().toUpperCase();
            
            if (APP_KEYS[key]) {
                els.loginErr.classList.add('hidden');
                const days = APP_KEYS[key];
                const expDate = new Date();
                expDate.setDate(expDate.getDate() + days);
                
                localStorage.setItem('avi_exp', expDate.toISOString());
                setupDashboard(expDate.toISOString());
            } else {
                els.loginErr.textContent = 'المفتاح غير صحيح';
                els.loginErr.classList.remove('hidden');
            }
        }

        function handleLogout() {
            localStorage.removeItem('avi_exp');
            els.keyInput.value = '';
            switchScreen('login');
            if(animFrameId) cancelAnimationFrame(animFrameId);
            isAnimating = false;
            els.startBtn.disabled = false;
        }

        function setupDashboard(exp) {
            const diff = new Date(exp) - new Date();
            const days = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
            els.expDate.textContent = days + ' يوم متبقي';
            
            switchScreen('dash');
            resizeCanvas();
            resetCanvas();
            generateFakeHistory();
            startLiveFeed();
        }

        // --- GAME LOGIC ---
        function startPrediction() {
            if (isAnimating || els.startBtn.disabled) return;
            
            // UI Reset
            els.resultBox.classList.add('hidden');
            els.statusText.textContent = 'جاري التحليل...';
            els.cooldownText.textContent = '';
            
            // Start Game Animation
            isAnimating = true;
            
            // Logic for prediction
            // Request: Cap at 10x.
            // Request: Wait 5 seconds AFTER result.
            
            resizeCanvas();
            
            // Smart Prediction (Max 10x)
            let r = Math.random();
            let target;
            if (r < 0.6) target = (Math.random() * 2 + 1.5).toFixed(2); // 1.5 - 3.5 (Common)
            else if (r < 0.9) target = (Math.random() * 3 + 3.5).toFixed(2); // 3.5 - 6.5 (Medium)
            else target = (Math.random() * 3.5 + 6.5).toFixed(2); // 6.5 - 10.0 (Rare High)
            
            // Hard Cap at 10.00
            if (parseFloat(target) > 10.00) target = "10.00";
            
            currentData = { x: 50, y: 350, target: parseFloat(target), points: [], multiplier: 1.00 };
            
            els.multiplierBox.style.color = '#00ff00'; // Green
            animateGame();
        }

        function animateGame() {
            if (!isAnimating) return;
            
            const ctx = els.ctx;
            const can = els.canvas;
            
            // Clear
            ctx.clearRect(0, 0, can.width, can.height);
            
            // Grid
            drawGrid(ctx, can);
            
            // Update Logic
            // Speed of growth
            currentData.x += 4;
            currentData.multiplier += 0.03; 
            
            // Y position (Exponential curve)
            currentData.y = 350 - Math.pow(currentData.multiplier, 1.5) * 20;
            
            if (currentData.y < 20) currentData.y = 20;
            
            currentData.points.push({x: currentData.x, y: currentData.y});
            
            // Draw Path
            ctx.beginPath();
            ctx.moveTo(50, 350);
            for (let p of currentData.points) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Fill under line
            ctx.lineTo(currentData.x, 350);
            ctx.lineTo(50, 350);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fill();
            
            // Draw Plane
            drawPlane(ctx, currentData.x, currentData.y, -45 - (currentData.multiplier * 5));
            
            // Update UI Text
            els.multiplierBox.textContent = currentData.multiplier.toFixed(2) + 'x';
            
            // Check Target
            if (currentData.multiplier >= currentData.target) {
                endGame(currentData.target);
                return;
            }
            
            animFrameId = requestAnimationFrame(animateGame);
        }
        
        function drawGrid(ctx, can) {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i=0; i<can.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, can.height); ctx.stroke(); }
            for(let i=0; i<can.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(can.width, i); ctx.stroke(); }
        }

        function drawPlane(ctx, x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            
            // Plane Body
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(20, 20);
            ctx.lineTo(0, 10);
            ctx.lineTo(-20, 20);
            ctx.closePath();
            ctx.fill();
            
            // Glow
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 20;
            ctx.fill();
            
            ctx.restore();
        }

        function endGame(result) {
            isAnimating = false;
            
            els.multiplierBox.textContent = result + 'x';
            els.multiplierBox.style.color = 'white';
            els.statusText.textContent = 'انتهت الجولة!';
            els.finalVal.textContent = result + 'x';
            els.resultBox.classList.remove('hidden');
            
            // Add History
            addHistoryItem(result);
            
            // Start 5 Second Cooldown
            let secondsLeft = 5;
            els.startBtn.disabled = true;
            els.cooldownText.textContent = `انتظر ${secondsLeft} ثواني...`;
            
            cooldownTimer = setInterval(() => {
                secondsLeft--;
                els.cooldownText.textContent = `انتظر ${secondsLeft} ثواني...`;
                
                if (secondsLeft <= 0) {
                    clearInterval(cooldownTimer);
                    els.startBtn.disabled = false;
                    els.cooldownText.textContent = '';
                    els.statusText.textContent = 'جاهز للتوقع';
                    els.multiplierBox.textContent = '1.00x';
                    resetCanvas();
                }
            }, 1000);
        }
        
        function resetCanvas() {
            const ctx = els.ctx;
            const can = els.canvas;
            ctx.clearRect(0, 0, can.width, can.height);
            drawGrid(ctx, can);
        }

        function resizeCanvas() {
            const rect = els.canvas.parentElement.getBoundingClientRect();
            els.canvas.width = rect.width;
            els.canvas.height = 400;
            resetCanvas();
        }

        // --- HELPERS ---
        function copyResult() {
            const t = els.finalVal.textContent;
            if(t && t !== '0.00x') {
                navigator.clipboard.writeText('Aviator Prediction: ' + t);
                alert('تم النسخ: ' + t);
            } else {
                alert('لا توجد نتيجة بعد');
            }
        }

        function startLiveFeed() {
            // Initial populate
            for(let i=0; i<15; i++) addLiveItem(false);
            
            // Frequent updates
            setInterval(() => {
                addLiveItem(true);
            }, 800); // Fast updates
        }
        
        function addLiveItem(removeOld) {
            const name = names[Math.floor(Math.random() * names.length)];
            const val = (Math.random() * 9 + 1).toFixed(2); // Between 1 and 10
            const won = Math.random() > 0.3;
            
            const div = document.createElement('div');
            div.className = 'live-item';
            div.innerHTML = `<span>${name}</span><span class="${won ? 'text-green-500' : 'text-red-500'}">${val}x</span>`;
            
            els.liveFeed.insertBefore(div, els.liveFeed.firstChild);
            
            if (removeOld && els.liveFeed.children.length > 20) {
                els.liveFeed.lastChild.remove();
            }
        }
        
        function generateFakeHistory() {
            els.historyBox.innerHTML = '';
            for(let i=0; i<10; i++) {
                let v = (Math.random() * 9 + 1).toFixed(2);
                addHistoryItem(v);
            }
        }
        
        function addHistoryItem(v) {
            let cls = v < 2 ? 'h-low' : (v < 5 ? 'h-mid' : 'h-high');
            let sp = document.createElement('span');
            sp.className = 'history-badge ' + cls;
            sp.textContent = v + 'x';
            els.historyBox.insertBefore(sp, els.historyBox.firstChild);
            if(els.historyBox.children.length > 20) els.historyBox.lastChild.remove();
        }

    </script>
</body>
</html>
